<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerostreet - Now Everyone Can Buy a Good Shoes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="Navbar-Container">
            <!-- Logo - Left side -->
            <div class="Logo">
                <h1><span style="color: #000000;">Aero</span><span style="color: #FF5330;">street</span></h1>
            </div>

            <!-- Navbar Menu - Center (hidden on mobile) -->
            <nav class="Navbar-Menu">
                <ul class="Menu">
                    <li><a href="#Home">Home</a></li>
                    <li><a href="#About">About</a></li>
                    <li><a href="#Products">Products</a></li>
                    <li><a href="#Categories">Categories</a></li>
                    <li><a href="#Contact">Contact</a></li>
                </ul>
            </nav>

            <!-- Right side - Cart + Hamburger -->
            <div class="Right-Side">
                <div class="Cart">
                    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" alt="Cart Icon"></a>
                </div>
                <!-- Mobile Menu Button -->
                <button class="Mobile-Menu-Btn" id="mobileMenuBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6 menu-icon">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6 close-icon">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Dropdown Menu -->
        <div class="Mobile-Dropdown" id="mobileDropdown">
            <ul class="Mobile-Menu">
                <li><a href="#Home">Home</a></li>
                <li><a href="#About">About</a></li>
                <li><a href="#Products">Products</a></li>
                <li><a href="#Categories">Categories</a></li>
                <li><a href="#Contact">Contact</a></li>
            </ul>
        </div>
    </header>
    <section id="Home" class="Hero-Section">
        <div class="Hero-Container">
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
